version: "3.8"

services:
  # Selenium Grid Hub
  selenium-hub:
    image: selenium/hub:latest
    container_name: selenium-hub
    ports:
      - "4444:4444"
    networks:
      - test_network

  # Selenium Chrome Node
  chrome:
    image: selenium/node-chrome:latest
    container_name: selenium-chrome
    shm_size: 2gb
    depends_on:
      - selenium-hub
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
    networks:
      - test_network

  # Python test runner
  selenium-tests:
    build:
      context: ./selenium
      dockerfile: Dockerfile
    container_name: selenium-test-runner
    depends_on:
      - selenium-hub
      - chrome
    environment:
      - SE_HUB_HOST=selenium-hub
      - SE_HUB_PORT=4444
      - APP_BASE_URL=http://host.docker.internal:5173
      - API_BASE_URL=http://host.docker.internal:8080
      - TEST_USERNAME=${TEST_USERNAME:-test@example.com}
      - TEST_PASSWORD=${TEST_PASSWORD:-password123}
    networks:
      - test_network
    volumes:
      - ./reports:/app/reports
      - ./screenshots:/app/screenshots
    extra_hosts:
      - "host.docker.internal:host-gateway"

networks:
  test_network:
    driver: bridge