server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Enable serving pre-compressed files if they exist (.gz files from Vite)
    gzip_static on;

    # Dynamic gzip compression for files that aren't pre-compressed
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript image/svg+xml;
    gzip_disable "MSIE [1-6]\.";

    # Fallback to index.html for Single Page Applications
    location / {
        try_files $uri $uri/ /index.html;
        # Never cache index.html to ensure users always get the latest app shell
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Cache hashed assets aggressively
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # Cache other static files gracefully
    location ~* \.(?:ico|gif|jpe?g|png|svg|woff2?|eot|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }
}
