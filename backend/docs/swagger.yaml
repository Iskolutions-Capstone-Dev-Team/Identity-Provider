paths:
  /.well-known/jwks.json:
    get:
      description: Retrieve the JSON Web Key Set for verifying JWT signatures
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Get JWKS
      tags:
      - JSON Web Key Set
  /api/v1/admin/users/{id}/access:
    put:
      consumes:
      - application/json
      description: Updates user client access mapping within the admin's scope.
      parameters:
      - description: User ID (UUID)
        in: path
        name: id
        required: true
        type: string
      - description: Access data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.UpdateUserAccessRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          description: OK
          schema:
            $ref: '#/definitions/dto.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Sync User Client Access
      tags:
      - Users
  /api/v1/admin/users/access:
    get:
      description: Fetch all client IDs and names managed by the admin.
      produces:
      - application/json
