basePath: /api/v1
definitions:
  dto.AccountTypeConfigResponse:
    properties:
      account_type:
        type: string
      clients:
        items:
          $ref: '#/definitions/dto.PreapprovedClientResponse'
        type: array
    type: object
  dto.ActivateAccountRequest:
    properties:
      invitation_code:
        type: string
      password:
        type: string
    type: object
  dto.ClientAccessResponse:
    properties:
      id:
        type: string
      name:
        type: string
    type: object
  dto.ClientResponse:
    properties:
      allowed_roles:
        items:
          $ref: '#/definitions/dto.RoleResponse'
        type: array
      base_url:
        type: string
      created_at:
        type: string
      description:
        type: string
      grants:
        items:
          type: string
        type: array
      id:
        type: string
      image_location:
        type: string
      logout_uri:
        type: string
      name:
        type: string
      redirect_uri:
        type: string
    type: object
  dto.ClientSecretResponse:
    properties:
      client_id:
        type: string
      client_secret:
        type: string
      message:
        type: string
    type: object
  dto.ErrorResponse:
    properties:
      error:
        example: Error description
        type: string
    type: object
  dto.GetAuditLogListResponse:
    properties:
      auditLogs:
        items:
          $ref: '#/definitions/dto.PostAuditLogRequest'
        type: array
      currentPage:
        type: integer
      lastPage:
        type: integer
      totalCount:
        format: int64
        type: integer
    type: object
  dto.InvitationRequest:
    properties:
      email:
        type: string
      invitation_type:
        type: string
    required:
    - email
    - invitation_type
    type: object
  dto.LoginRequest:
    properties:
      client_id:
        type: string
      email:
        type: string
      password:
        type: string
    required:
    - client_id
    - email
    - password
    type: object
  dto.LogoutRequest:
    properties:
      client_id:
        type: string
    required:
    - client_id
    type: object
  dto.OTPRequest:
    properties:
      email:
        type: string
    required:
    - email
    type: object
  dto.PostAuditLogRequest:
    properties:
      action:
        type: string
      actor:
        type: string
      metadata:
        type: object
      status:
        enum:
        - success
        - fail
        type: string
      target:
        type: string
      timestamp:
        type: string
    required:
    - action
    - target
    type: object
  dto.PreapprovedClientResponse:
    properties:
      id:
        type: string
      name:
        type: string
    type: object
  dto.RefreshRequest:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  dto.RegistrationConfigResponse:
    properties:
      account_types:
        items:
          $ref: '#/definitions/dto.AccountTypeConfigResponse'
        type: array
    type: object
  dto.RoleListResponse:
    properties:
      current_page:
        type: integer
      last_page:
        type: integer
      roles:
        items:
          $ref: '#/definitions/dto.RoleResponse'
        type: array
      total_count:
        type: integer
    type: object
  dto.RoleRequest:
    properties:
      description:
        type: string
      permission_ids:
        items:
          type: integer
        type: array
      role_name:
        type: string
    type: object
  dto.RoleResponse:
    properties:
      can_delete:
        type: boolean
      can_edit:
        type: boolean
      created_at:
        type: string
      description:
        type: string
      id:
        type: integer
      permissions:
        items:
          $ref: '#/definitions/models.Permission'
        type: array
      role_name:
        type: string
      updated_at:
        type: string
    type: object
  dto.SuccessResponse:
    properties:
      message:
        type: string
    type: object
  dto.TokenExchangeRequest:
    properties:
      client_id:
        type: string
      client_secret:
        type: string
      code:
        type: string
    required:
    - client_id
    - client_secret
    - code
    type: object
  dto.TokenResponse:
    properties:
      access_token:
        type: string
      expires_in:
        type: integer
      refresh_token:
        type: string
      scope:
        type: string
      token_type:
        type: string
    type: object
  dto.UpdatePasswordRequest:
    properties:
      new_password:
        type: string
    required:
    - new_password
    type: object
  dto.UpdatePreapprovedClientsRequest:
    properties:
      account_type_id:
        type: integer
      client_ids:
        items:
          type: string
        type: array
    type: object
  dto.UpdateStatusRequest:
    properties:
      new_status:
        type: string
    required:
    - new_status
    type: object
  dto.UpdateUserAccessRequest:
    properties:
      client_ids:
        items:
          type: string
        type: array
    required:
    - client_ids
    type: object
  dto.UpdateUserRoleRequest:
    properties:
      role_id:
        type: integer
    type: object
  dto.UserInfoResponse:
    properties:
      email:
        type: string
      first_name:
        type: string
      id:
        type: string
      last_name:
        type: string
      middle_name:
        type: string
      name_suffix:
        type: string
      roles:
        type: string
    type: object
  dto.UserRequest:
    properties:
      account_type:
        type: string
      allowed_appclients:
        items:
          type: string
        type: array
      email:
        type: string
      first_name:
        type: string
      last_name:
        type: string
      middle_name:
        type: string
      name_suffix:
        type: string
      password:
        minLength: 8
        type: string
      role_id:
        type: integer
      status:
        type: string
    required:
    - email
    - first_name
    - last_name
    - password
    - status
    type: object
  dto.UserResponse:
    properties:
      clients:
        items:
          $ref: '#/definitions/dto.ClientAccessResponse'
        type: array
      created_at:
        type: string
      email:
        type: string
      first_name:
        type: string
      id:
        type: string
      last_name:
        type: string
      middle_name:
        type: string
      name_suffix:
        type: string
      roles:
        $ref: '#/definitions/dto.UserRoleResponse'
      status:
        type: string
      updated_at:
        type: string
    type: object
  dto.UserResponseList:
    properties:
      current_page:
        type: integer
      last_page:
        type: integer
      total_count:
        type: integer
      users:
        items:
          $ref: '#/definitions/dto.UserResponse'
        type: array
    type: object
  dto.UserRoleResponse:
    properties:
      description:
        type: string
      id:
        type: integer
      role_name:
        type: string
    type: object
  dto.UserSimplifiedResponse:
    properties:
      clients:
        items:
          $ref: '#/definitions/dto.ClientAccessResponse'
        type: array
      created_at:
        type: string
      email:
        type: string
      first_name:
        type: string
      id:
        type: string
      last_name:
        type: string
      middle_name:
        type: string
      name_suffix:
        type: string
      status:
        type: string
      updated_at:
        type: string
    type: object
  dto.UserSimplifiedResponseList:
    properties:
      current_page:
        type: integer
      last_page:
        type: integer
      total_count:
        type: integer
      users:
        items:
          $ref: '#/definitions/dto.UserSimplifiedResponse'
        type: array
    type: object
  dto.VerifyOTPRequest:
    properties:
      email:
        type: string
      otp:
        type: string
    required:
    - email
    - otp
    type: object
  models.Permission:
    properties:
      id:
        type: integer
      permissionName:
        type: string
    type: object
  service.JWK:
    properties:
      alg:
        type: string
      e:
        type: string
      kid:
        type: string
      kty:
        type: string
      "n":
        type: string
      use:
        type: string
    type: object
  service.JWKS:
    properties:
      keys:
        items:
          $ref: '#/definitions/service.JWK'
        type: array
    type: object
host: identity-provider.isaxbsit2027.com
info:
  contact:
    email: causonmikolorenz@gmail.com
    name: Miko Lorenz Causon
  description: Identity Provider for the Unified School System Capstone.
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: http://swagger.io/terms/
  title: Unified Access Identity Provider API
  version: "1.0"
paths:
  /.well-known/jwks.json:
    get:
      description: Retrieve the JSON Web Key Set for verifying JWT signatures
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/service.JWKS'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - Bearer: []
      summary: Get JWKS
      tags:
      - JSON Web Key Set
  /activate:
    post:
      consumes:
      - application/json
      description: Set a password for an account using an invitation code.
      parameters:
      - description: Activation Request
        in: body
        name: req
        required: true
        schema:
          $ref: '#/definitions/dto.ActivateAccountRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Activate Account
      tags:
      - Registration
  /activate/{code}:
    get:
      description: Validate if an invitation code exists and is within 24h.
      parameters:
      - description: Invitation Code
        in: path
        name: code
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.SuccessResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Check Invitation
      tags:
      - Registration
  /admin/clients:
    get:
      description: Fetch active clients with pagination
      parameters:
      - default: 10
        description: Pagination Limit
        in: query
        name: limit
        type: integer
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.ClientResponse'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: List Service Providers
      tags:
      - Clients
    post:
      consumes:
      - multipart/form-data
      description: Creates client, saves icon, hashes secret, and maps roles
      parameters:
      - description: Client Name
        in: formData
        name: name
        required: true
        type: string
      - description: Tag
        in: formData
        name: Tag
        required: true
        type: string
      - description: Description
        in: formData
        name: description
        type: string
      - description: Base URL
        in: formData
        name: base_url
        required: true
        type: string
      - description: Redirect URI
        in: formData
        name: redirect_uri
        required: true
        type: string
      - description: Logout URI
        in: formData
        name: logout_uri
        required: true
        type: string
      - collectionFormat: csv
        description: Grants (e.g. authorization_code)
        in: formData
        items:
          type: string
        name: grants
        required: true
        type: array
      - collectionFormat: csv
        description: Initial Roles
        in: formData
        items:
          type: string
        name: roles
        type: array
      - description: Client Icon
        in: formData
        name: image
        required: true
        type: file
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Register a new Service Provider with Icon
      tags:
      - Clients
  /admin/clients/{id}:
    delete:
      parameters:
      - description: Client UUID
        in: path
        name: id
        required: true
        type: string
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Soft Delete Client
      tags:
      - Clients
    get:
      description: Fetch full details including grants and roles
      parameters:
      - description: Client UUID
        in: path
        name: id
        required: true
        type: string
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.ClientResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Get Client Details
      tags:
      - Clients
    put:
      consumes:
      - application/json
      description: Update safe fields (Name, Description, URLs, Image)
      parameters:
      - description: Client UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Update Client Info
      tags:
      - Clients
  /admin/registration/config:
    get:
      description: Fetch account types and their top 5 preapproved clients.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.RegistrationConfigResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Get Registration Config
      tags:
      - Registration
  /admin/registration/config/{id}:
    get:
      description: Fetch all clients preapproved for a given account type.
      parameters:
      - description: Account Type ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.AccountTypeConfigResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Get Clients By Account Type ID
      tags:
      - Registration
  /admin/registration/preapproved:
    put:
      consumes:
      - application/json
      description: Add/Remove client IDs for a specific account type.
      parameters:
      - description: Update Request
        in: body
        name: req
        required: true
        schema:
          $ref: '#/definitions/dto.UpdatePreapprovedClientsRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Update Preapproved Clients
      tags:
      - Registration
  /admin/roles:
    get:
      consumes:
      - application/json
      description: Retrieves a paginated list of non-deleted roles
      parameters:
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.RoleListResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: List all roles
      tags:
      - Roles
    post:
      consumes:
      - application/json
      description: Adds a new global or SP-prefixed role to the system
      parameters:
      - description: Role details
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.RoleRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Create a new role
      tags:
      - Roles
  /admin/roles/{id}:
    delete:
      description: Marks a role as deleted in the audit trail
      parameters:
      - description: Role ID
        in: path
        name: id
        required: true
        type: integer
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.SuccessResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Soft delete a role
      tags:
      - Roles
    get:
      consumes:
      - application/json
      description: Fetches full details of a specific role
      parameters:
      - description: Role ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.RoleResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Get role by ID
      tags:
      - Roles
    put:
      consumes:
      - application/json
      description: Modifies role name or description
      parameters:
      - description: Role ID
        in: path
        name: id
        required: true
        type: integer
      - description: Updated role data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.RoleRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Update an existing role
      tags:
      - Roles
  /admin/users/{id}/access:
    put:
      consumes:
      - application/json
      description: Updates user client access mapping within the admin's scope.
      parameters:
      - description: User ID (UUID)
        in: path
        name: id
        required: true
        type: string
      - description: Access data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.UpdateUserAccessRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Sync User Client Access
      tags:
      - Users
  /admin/users/access:
    get:
      description: Fetch all client IDs and names managed by the admin.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.ClientAccessResponse'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: List Managed Clients
      tags:
      - Users
  /admin/users/admins:
    get:
      description: Get a paginated list of all accounts that have a role
      parameters:
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.UserResponseList'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: List Admin Users
      tags:
      - Users
  /auth/authorize:
    get:
      description: Validates the authorization request for the user.
      parameters:
      - description: Client ID
        in: query
        name: client_id
        required: true
        type: string
      responses:
        "302":
          description: Found
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Authorize user
      tags:
      - Authentication
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticate user and return a redirect URL with auth code
      parameters:
      - description: Login Credentials
        in: body
        name: login
        required: true
        schema:
          $ref: '#/definitions/dto.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Login and Authorize
      tags:
      - Authentication
  /auth/logout:
    post:
      consumes:
      - application/json
      description: Clear session cookie and revoke all issued tokens for the user
      parameters:
      - description: Logout Request
        in: body
        name: req
        required: true
        schema:
          $ref: '#/definitions/dto.LogoutRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.SuccessResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Global Logout
      tags:
      - Authentication
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: Invalidates old refresh token and issues a new pair
      parameters:
      - description: Refresh Request
        in: body
        name: req
        required: true
        schema:
          $ref: '#/definitions/dto.RefreshRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.TokenResponse'
        "400":
          description: Bad Request
          schema:
