        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Login and Authorize
      tags:
      - Authentication
  /api/v1/auth/logout:
    post:
      consumes:
      - application/json
      consumes:
