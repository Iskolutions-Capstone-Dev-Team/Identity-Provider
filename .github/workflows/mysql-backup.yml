name: MySQL Backup Pipeline

on:
  schedule:
    # - cron: "0 */12 * * *"   # every 12 hours
    - cron: "*/5 * * * *"   # every 5 minutes for testing
  workflow_dispatch:

jobs:
  mysql-backup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout backup branch
        uses: actions/checkout@v4
        with:
          ref: backups

      - name: Set up SSH
        env:
          BACKUP_SSH_KEY: ${{ secrets.BACKUP_SSH_KEY }}
        run: |
          install -m 700 -d "$HOME/.ssh"
          printf '%s' "$BACKUP_SSH_KEY" > "$HOME/.ssh/backup_key"
          chmod 600 "$HOME/.ssh/backup_key"

      - name: Dump MySQL Database from Lightsail
        env:
          SSH_HOST: ${{ secrets.BACKUP_SSH_HOST }}
          SSH_USER: ${{ secrets.BACKUP_SSH_USER }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASS: ${{ secrets.DB_PASS }}
          DB_NAME: ${{ secrets.DB_NAME }}
        run: |
          TIMESTAMP=$(date +"%Y-%m-%d_%H-%M")
          ssh -i "$HOME/.ssh/backup_key" \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            "$SSH_USER@$SSH_HOST" \
            "
              mysqldump -u \"$DB_USER\" -p\"$DB_PASS\" \"$DB_NAME\" | gzip > backup.sql.gz
            "

          scp -i "$HOME/.ssh/backup_key" \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            "$SSH_USER@$SSH_HOST:backup.sql.gz" "./backup-$TIMESTAMP.sql.gz"

      - name: Cleanup remote temp file
        env:
          SSH_HOST: ${{ secrets.BACKUP_SSH_HOST }}
          SSH_USER: ${{ secrets.BACKUP_SSH_USER }}
        run: |
          ssh -i "$HOME/.ssh/backup_key" \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            "$SSH_USER@$SSH_HOST" "rm -f backup.sql.gz"

      - name: Git Commit and Push Database Backup
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

          # Keep only last 20 backup files
          ls -1t *.sql.gz | sed -e '1,20d' | xargs -r rm

          git add *.sql.gz
          git commit -m "Database backup: $(date)" || echo "No changes to commit"
          git push origin backups